version: 0.10.0
info:
  companyName: Vuong
  productName: DevToolbox
  productIdentifier: com.vuon9.devtoolbox
  description: DevToolbox
  copyright: (c) 2026, Vuong
  comments: DevToolbox is a set of useful tools for daily development.
  version: 0.9.4
dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - node_modules
      - frontend
      - bin
    file:
      - .DS_Store
      - .gitignore
      - .gitkeep
    watched_extension:
      - '*.go'
      - '*.js'
      - '*.ts'
    git_ignore: true
  executes:
    - cmd: wails3 build DEV=true
      type: blocking
    - cmd: wails3 task common:dev:frontend
      type: background
    - cmd: wails3 task run
      type: primary
fileAssociations: null
other:
  - name: My Other Data
