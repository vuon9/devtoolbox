root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  cmd = "go run . --server-only --port ${PORT:-8081}"
  bin = "tmp/main"
  full_bin = ""
  include_ext = ["go"]
  exclude_dir = ["frontend", "tmp", "vendor", "testdata"]
  exclude_file = ["_test.go"]
  delay = 500
  stop_on_error = true
  log = "build-errors.log"

[log]
  time = true

[misc]
  clean_on_exit = true
