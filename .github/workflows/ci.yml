name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  # Allow manual trigger
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.25.0"
          check-latest: true

      - name: Cache APT packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libgtk-4-dev libwebkitgtk-6.0-dev libvulkan-dev libgraphene-1.0-dev
          version: 2.0
          execute_install_scripts: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v5.0.5
        with:
          path: |
            frontend/node_modules
            ~/.bun/install/cache
          key: bun-deps-${{ runner.os }}-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: |
            bun-deps-${{ runner.os }}-

      - name: Install frontend dependencies
        run: |
          cd frontend && bun install

      - name: Build frontend
        run: |
          cd frontend && bun run build

      - name: Build Go application
        run: |
          go build .

  backend-tests:
    name: Backend Tests
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.25.0"
          check-latest: true

      - name: Run Go Tests
        run: |
          go test -race -count=1 ./internal/... -coverprofile=coverage.out
          go install github.com/boumenot/gocover-cobertura@latest
          gocover-cobertura < coverage.out > coverage.xml

      - name: Code Coverage Report
        if: github.event_name == 'pull_request'
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: coverage.xml
          badge: true
          fail_below_min: true
          format: markdown
          hide_branch_rate: false
          hide_complexity: true
          indicators: true
          output: both
          thresholds: "60 80"

      - name: Code Coverage Comment
        uses: marocchino/sticky-pull-request-comment@v3.0.4
        if: github.event_name == 'pull_request'
        with:
          recreate: true
          path: code-coverage-results.md

  govulncheck:
    name: Go Vulnerability Check
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.25.0"
          check-latest: true

      - name: Install system deps (Wails CGO)
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev libvulkan-dev libgraphene-1.0-dev

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./internal/... || true

  frontend-tests:
    name: Frontend Tests
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Setup Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: "1.25.0"
          check-latest: true

      - name: Cache APT packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: libgtk-4-dev libwebkitgtk-6.0-dev libvulkan-dev libgraphene-1.0-dev
          version: 2.0
          execute_install_scripts: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v5.0.5
        with:
          path: |
            frontend/node_modules
            ~/.bun/install/cache
          key: bun-deps-${{ runner.os }}-${{ hashFiles('frontend/bun.lock') }}
          restore-keys: |
            bun-deps-${{ runner.os }}-

      - name: Install frontend dependencies
        run: |
          cd frontend && bun install

      - name: Format check
        run: |
          cd frontend && bun run format:check

      - name: Run frontend tests
        run: |
          cd frontend && bun run test
